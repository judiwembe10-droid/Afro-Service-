<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AfroService | Boutique Officielle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onValue, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // Ta configuration Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyB0NF5a7jhUyuA1FTIjK1Iw_x3eGHcrykY",
            authDomain: "afro-service-b8999.firebaseapp.com",
            databaseURL: "https://afro-service-b8999-default-rtdb.firebaseio.com",
            projectId: "afro-service-b8999",
            storageBucket: "afro-service-b8999.firebasestorage.app",
            messagingSenderId: "324669731674",
            appId: "1:324669731674:web:8257262c8e1f7b7d7ab963"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const stockRef = ref(db, 'stock');

        // Écoute des changements en temps réel (Sync automatique pour tous les clients)
        onValue(stockRef, (snapshot) => {
            const data = snapshot.val();
            window.stock = data ? Object.keys(data).map(key => ({...data[key], id: key})) : [];
            renderProducts(window.stock);
            renderAdminStock();
            generateHero();
            renderMenu();
        });

        // Fonction pour sauvegarder/modifier (Firebase)
        window.saveProductToFirebase = function() {
            const name = document.getElementById('admName').value.trim();
            const price = document.getElementById('admPrice').value;
            if(!name || !price) return alert("Nom et prix requis");

            const p = {
                name: name,
                price: price,
                old: document.getElementById('admOld').value,
                desc: document.getElementById('admDesc').value,
                cat: document.getElementById('admCat').value,
                sub: document.getElementById('admSub').value,
                imgs: document.getElementById('admImgs').value.split(',').map(i => i.trim()).filter(i => i !== ""),
                colors: document.getElementById('admColors').value,
                memory: document.getElementById('admMem').value
            };

            if(window.editId) {
                update(ref(db, 'stock/' + window.editId), p);
                window.editId = null;
                alert("Article mis à jour !");
            } else {
                push(stockRef, p);
                alert("Article ajouté avec succès !");
            }
            closeAdmin();
        };

        window.deleteProductFromFirebase = function(id) {
            if(confirm("Supprimer définitivement cet article ?")) {
                remove(ref(db, 'stock/' + id));
            }
        };
    </script>

    <style>
        :root { --afro-blue: #1d265e; --afro-red: #bd1e24; }
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #sideNav, #sideCart, #detailModal { transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .promo-badge { background: linear-gradient(45deg, #bd1e24, #ff4d4d); }
    </style>
</head>

                    <input id="admName" type="text" placeholder="Nom de l'article" class="border p-3 rounded-xl text-sm">

                        <input id="admPrice" type="number" placeholder="Prix Vente" class="border p-3 rounded-xl text-sm font-bold">

    <script>
        // DONNÉES INITIALES
        let categories = JSON.parse(localStorage.getItem('AFRO_CATS')) || [
            { name: "Téléphones", subs: ["iPhone", "Samsung", "Tecno"] },
            { name: "Electroménager", subs: ["Frigos", "Fours"] }
        ];
        let cart = [];
        window.stock = [];
        window.editId = null;

        // RENDU PRODUITS
        function renderProducts(data) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = data.map((p) => {
                const promo = p.old ? Math.round(((p.old - p.price) / p.old) * 100) : 0;
                const img = p.imgs && p.imgs[0] ? p.imgs[0] : 'https://via.placeholder.com/300';
                return `
                <div class="bg-white rounded-2xl p-3 shadow-sm relative cursor-pointer hover:shadow-md transition" onclick="showDetail('${p.id}')">
                    ${promo > 0 ? `<span class="absolute top-2 left-2 promo-badge text-white text-[9px] font-black px-2 py-1 rounded-lg z-10">⚡ -${promo}%</span>` : ''}
                    <div class="aspect-square overflow-hidden rounded-xl mb-3"><img src="${img}" class="w-full h-full object-cover"></div>
                    <h3 class="text-[10px] font-black uppercase line-clamp-2 h-8 leading-tight">${p.name}</h3>
                    <div class="mt-2 flex items-baseline gap-2">
                        <span class="text-red-600 font-black text-sm">${parseInt(p.price).toLocaleString()} F</span>
                    </div>
                </div>`;
            }).join('');
        }

        // DETAILS
        function showDetail(id) {
            const p = window.stock.find(x => x.id === id);
            const content = document.getElementById('detailContent');
            const imgs = p.imgs && p.imgs.length ? p.imgs : ['https://via.placeholder.com/300'];
            content.innerHTML = `
                <div class="relative overflow-hidden rounded-3xl mb-6 shadow-xl">
                    <div id="slideTrack" class="flex transition-transform duration-500">${imgs.map(img => `<img src="${img}" class="min-w-full aspect-square object-cover">`).join('')}</div>
                    ${imgs.length > 1 ? `<div class="absolute inset-0 flex items-center justify-between px-3"><button onclick="moveSlide(-1,${imgs.length})" class="bg-white/90 w-8 h-8 rounded-full font-bold shadow">‹</button><button onclick="moveSlide(1,${imgs.length})" class="bg-white/90 w-8 h-8 rounded-full font-bold shadow">›</button></div>` : ''}
                </div>
                <h2 class="text-xl font-black text-[#1d265e] uppercase mb-4">${p.name}</h2>
                <div class="text-2xl font-black text-red-600 mb-6">${parseInt(p.price).toLocaleString()} F</div>
                <div class="space-y-4">
                    ${p.colors ? `<select id="vCol" class="w-full border p-3 rounded-xl text-xs font-bold">${p.colors.split(',').map(c => `<option>${c.trim()}</option>`)}</select>` : ''}
                    ${p.memory ? `<select id="vMem" class="w-full border p-3 rounded-xl text-xs font-bold">${p.memory.split(',').map(m => `<option>${m.trim()}</option>`)}</select>` : ''}
                    <input id="vQty" type="number" value="1" min="1" class="w-full border p-3 rounded-xl font-bold text-xs">
                    <div class="bg-slate-50 p-4 rounded-2xl text-xs italic">${p.desc || 'Qualité Afro Service.'}</div>
                </div>
                <button onclick="addToCart('${p.id}')" class="w-full bg-[#1d265e] text-white py-4 rounded-2xl font-black uppercase text-xs mt-8">Ajouter au Panier</button>`;
            document.getElementById('detailModal').style.transform = "translateX(0)";
            document.getElementById('overlay').classList.remove('hidden');
        }

        let currentSlide = 0;
        function moveSlide(dir, total) {
            currentSlide = (currentSlide + dir + total) % total;
            document.getElementById('slideTrack').style.transform = `translateX(-${currentSlide * 100}%)`;
        }

        // PANIER
        function addToCart(id) {
            const p = window.stock.find(x => x.id === id);
            const qty = parseInt(document.getElementById('vQty').value);
            const color = document.getElementById('vCol')?.value || "";
            const mem = document.getElementById('vMem')?.value || "";
            for(let i=0; i<qty; i++) {
                cart.push({ name: `${p.name} ${color} ${mem}`.trim(), price: p.price, img: p.imgs[0] });
            }
            updateCart(); closeDetail(); openCart();
        }

        function updateCart() {
            let total = 0;
            document.getElementById('cartItems').innerHTML = cart.map((item, i) => {
                total += parseInt(item.price);
                return `<div class="flex gap-4 bg-white p-3 rounded-2xl items-center shadow-sm">
                    <img src="${item.img}" class="w-12 h-12 rounded-lg object-cover">
                    <div class="flex-1"><p class="text-[9px] font-black uppercase">${item.name}</p><p class="text-red-600 font-bold text-xs">${parseInt(item.price).toLocaleString()} F</p></div>
                    <button onclick="cart.splice(${i},1);updateCart()" class="text-red-600 font-bold px-2">×</button></div>`;
            }).join('');
            document.getElementById('cartTotal').innerText = total.toLocaleString() + " F";
            document.getElementById('badge').innerText = cart.length;
        }

        function checkout() {
            const name = document.getElementById('cName').value.trim();
            const tel = document.getElementById('cTel').value.trim();
            const loc = document.getElementById('cQuartier').value.trim();
            if(!name || !tel || !loc || !cart.length) return alert("Remplissez vos infos !");
            const items = cart.map(x => `- ${x.name}`).join('%0A');
            const msg = `*COMMANDE AFRO SERVICE*%0A*Client:* ${name}%0A*Tél:* ${tel}%0A*Lieu:* ${loc}%0A%0A*Articles:*%0A${items}%0A%0A*TOTAL: ${document.getElementById('cartTotal').innerText}*`;
            window.open(`https://wa.me/237658562104?text=${msg}`, '_blank');
        }

        // ADMIN UI
        function openAdmin() {
            if(prompt("Mot de passe Admin :") === "afro2026") document.getElementById('adminModal').classList.remove('hidden');
        }

        function renderAdminStock() {
            document.getElementById('stockList').innerHTML = window.stock.map((p, i) => `
                <div class="flex items-center justify-between bg-white p-3 rounded-xl border">
                    <div class="flex flex-col"><span class="font-black uppercase text-[10px]">${p.name}</span><span class="text-red-600 font-bold text-xs">${parseInt(p.price).toLocaleString()} F</span></div>
                    <div class="flex gap-2">
                        <button onclick="editItem('${p.id}')" class="bg-blue-100 text-blue-600 p-2 rounded-lg text-[10px] font-bold">Modifier</button>
                        <button onclick="deleteProductFromFirebase('${p.id}')" class="bg-red-100 text-red-600 p-2 rounded-lg text-[10px] font-bold">Suppr.</button>
                    </div>
                </div>`).join('');
            document.getElementById('admCat').innerHTML = categories.map(c => `<option value="${c.name}">${c.name}</option>`).join('');
            document.getElementById('admCatsRaw').value = categories.map(c => `${c.name}:${c.subs.join(',')}`).join(';');
            updateAdminSubs();
        }

        function editItem(id) {
            window.editId = id; const p = window.stock.find(x => x.id === id);
            document.getElementById('admName').value = p.name;
            document.getElementById('admPrice').value = p.price;
            document.getElementById('admOld').value = p.old || '';
            document.getElementById('admImgs').value = p.imgs.join(',');
            document.getElementById('admDesc').value = p.desc || '';
            document.getElementById('admCat').value = p.cat;
            updateAdminSubs();
            document.getElementById('admSub').value = p.sub;
            document.getElementById('admColors').value = p.colors || '';
            document.getElementById('admMem').value = p.memory || '';
            document.getElementById('admTitle').innerText = "MODIFIER : " + p.name;
        }

        // HERO SLIDER
        function generateHero() {
            const hero = document.getElementById('heroSlider');
            const shuffled = [...window.stock].sort(() => 0.5 - Math.random()).slice(0, 5);
            hero.innerHTML = shuffled.map(p => `
                <div class="min-w-full h-full relative">
                    <img src="${p.imgs[0]}" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-black/40 flex flex-col justify-center px-10 text-white">
                        <h2 class="text-xl md:text-3xl font-black uppercase italic">${p.name}</h2>
                        <button onclick="showDetail('${p.id}')" class="mt-4 bg-white text-[#1d265e] px-6 py-2 rounded-full font-black text-[10px] uppercase w-fit">Acheter</button>
                    </div>
                </div>`).join('');
        }

        // UTILS UI
        function openNav() { document.getElementById('sideNav').style.transform = "translateX(0)"; document.getElementById('overlay').classList.remove('hidden'); }
        function openCart() { document.getElementById('sideCart').style.transform = "translateX(0)"; document.getElementById('overlay').classList.remove('hidden'); }
        function closeMenus() { document.querySelectorAll('#sideNav, #sideCart, #detailModal').forEach(el => el.style.transform = el.id === 'sideNav' ? "translateX(-100%)" : "translateX(100%)"); document.getElementById('overlay').classList.add('hidden'); }
        function closeAdmin() { document.getElementById('adminModal').classList.add('hidden'); window.editId = null; document.getElementById('admTitle').innerText = "Nouveau Produit"; }
        function closeDetail() { document.getElementById('detailModal').style.transform = "translateX(100%)"; document.getElementById('overlay').classList.add('hidden'); currentSlide = 0; }
        function quickSearch(q) { renderProducts(window.stock.filter(p => p.name.toLowerCase().includes(q.toLowerCase()))); }
        function updateAdminSubs() {
            const cat = categories.find(c => c.name === document.getElementById('admCat').value);
            document.getElementById('admSub').innerHTML = cat ? cat.subs.map(s => `<option value="${s}">${s}</option>`).join('') : '';
        }
        function renderMenu() {
            const menu = document.getElementById('categoryMenu');
            menu.innerHTML = `<button onclick="renderProducts(window.stock);closeMenus()" class="w-full text-left px-6 py-4 font-black text-xs text-red-600 border-b">🏷️ TOUTE LA BOUTIQUE</button>`;
            categories.forEach(c => {
                menu.innerHTML += `<button onclick="renderProducts(window.stock.filter(p=>p.cat==='${c.name}'));closeMenus()" class="w-full text-left px-6 py-4 font-black text-xs text-[#1d265e] uppercase bg-slate-50 border-b">${c.name}</button>`;
            });
        }
        function updateCatsStructure() {
            const raw = document.getElementById('admCatsRaw').value;
            categories = raw.split(';').map(x => { const [n, s] = x.split(':'); return { name: n.trim(), subs: s ? s.split(',').map(z => z.trim()) : [] }; });
            localStorage.setItem('AFRO_CATS', JSON.stringify(categories));
            renderMenu(); alert("Rayons mis à jour !");
        }
        
        setInterval(() => {
            const s = document.getElementById('heroSlider');
            if(s && s.children.length > 1) {
                let idx = (parseInt(s.dataset.idx) || 0) + 1;
                if(idx >= s.children.length) idx = 0;
                s.style.transform = `translateX(-${idx * 100}%)`;
                s.dataset.idx = idx;
            }
        }, 5000);
    </script>
</body>
